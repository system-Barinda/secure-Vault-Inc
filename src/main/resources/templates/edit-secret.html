<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Secret</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f6fa;
            padding: 40px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 500px;
            margin: auto;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            background: #6a5cff;
            color: white;
            padding: 10px;
            border: none;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Edit Secret</h2>

    <form th:action="@{/secret/update}" method="post">

        <!-- IMPORTANT -->
        <input type="hidden" name="id" th:value="${secret.id}" />

        <input type="text" name="title" th:value="${secret.title}" required>

        <textarea name="content" required
                  th:text="${secret.content}"></textarea>

        <button type="submit">Update</button>
    </form>
</div>

</body>
</html>
