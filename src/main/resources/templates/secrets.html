<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Secrets</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(120deg, #6a5cff, #9f6eff);
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 15px 40px;
            background: white;
        }

        .btn-primary {
            background: linear-gradient(45deg, #6a5cff, #9f6eff);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
        }

        .btn-edit {
            background: orange;
            color: white;
            padding: 5px 10px;
            border: none;
            cursor: pointer;
        }

        .btn-delete {
            background: red;
            color: white;
            padding: 5px 10px;
            border: none;
            cursor: pointer;
        }

        .container {
            padding: 40px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
        }

        .error {
            color: red;
            margin-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

    </style>

    <script>
        function toggleForm() {
            const form = document.getElementById("addForm");
            form.style.display = form.style.display === "none" ? "block" : "none";
        }
    </script>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div><b>Vault</b></div>

    <div>
        <a th:href="@{/dashboard}">Home</a>
        <a th:href="@{/secrets}">Secrets</a>
    </div>

    <a th:href="@{/logout}" class="btn-primary">Logout</a>
</div>

<div class="container">

    <!-- ERROR -->
    <div th:if="${error}" class="error" th:text="${error}"></div>

    <!-- TOP BAR -->
    <div class="card top-bar">
        <h3>Your Vault</h3>
        <button onclick="toggleForm()" class="btn-primary">+ Add New</button>
    </div>

    <!-- ADD FORM (HIDDEN) -->
    <div class="card" id="addForm" style="display:none;">
        <h3>Add Entry</h3>

        <form th:action="@{/secret}" method="post">
            <input type="text" name="title"
                   placeholder="Platform (e.g Gmail)"
                   required>

            <textarea name="content"
                      placeholder="Secret (min 4 characters)"
                      required></textarea>

            <button type="submit" class="btn-primary">Save</button>
        </form>
    </div>

    <!-- LIST -->
    <div class="card">
        <table>
            <tr>
                <th>Platform</th>
                <th>Secret</th>
                <th>Action</th>
            </tr>

            <tr th:each="secret : ${secrets}">
                <td th:text="${secret.title}"></td>

                <!-- SAFE MASK -->
                <td th:text="${secret.content.length() > 2 
                    ? #strings.repeat('*', secret.content.length() - 2) + secret.content.substring(secret.content.length() - 2) 
                    : secret.content}">
                </td>

                <td>
                    <!-- EDIT -->
                    <a th:href="@{'/secret/edit/' + ${secret.id}}">
                        <button class="btn-edit">Edit</button>
                    </a>

                    <!-- DELETE -->
                    <form th:action="@{'/secret/delete/' + ${secret.id}}" method="post" style="display:inline;">
                        <button class="btn-delete">Delete</button>
                    </form>
                </td>
            </tr>

        </table>
    </div>

</div>

</body>
</html>
